name: contract-tests-nightly

# Nightly contract test against the deployed engine.
# Catches drift that slipped past PR-time gates (e.g. manual deploys
# bypassing CI -- still the case until Track B6 ships CI-on-merge deploy).
#
# Per docs/plans/SESSION-13-api-typing-audit.md §5.4.
# Rate-limited and parallelism-capped to stay within App Service B1 SKU
# budget (see memory feedback_appservice_deploy_python.md cold-start trap).

on:
  schedule:
    - cron: '0 7 * * *'      # 07:00 UTC = 02:00 ET / 23:00 PT (off-hours)
  workflow_dispatch:           # manual trigger for ad-hoc checks

jobs:
  schemathesis-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Opt into Node 24 ahead of the 2026-06-02 forced flip.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Schemathesis
        run: |
          python -m pip install --upgrade pip
          pip install schemathesis 'hypothesis<7' httpx

      - name: Schemathesis against deployed engine
        env:
          # Schemathesis v4 removed --hooks; load via env var instead.
          SCHEMATHESIS_HOOKS: ci.schemathesis_hooks
        run: |
          schemathesis run \
            https://aigovern.sandboxhub.co/openapi.json \
            --checks all \
            --max-examples 25 \
            --workers 2 \
            --rate-limit 5/s

      - name: Alert on failure
        if: failure() && env.APP_INSIGHTS_INGESTION_URL != ''
        env:
          APP_INSIGHTS_INGESTION_URL: ${{ secrets.APP_INSIGHTS_INGESTION_URL }}
        run: |
          # Post a custom event so existing App Insights alert rules fire.
          # Failure here is non-fatal -- the workflow failure itself is the signal.
          curl -s -X POST "$APP_INSIGHTS_INGESTION_URL" \
            -H "Content-Type: application/json" \
            -d '{"name":"contract_drift_nightly","properties":{"branch":"main"}}' \
            || echo "App Insights post failed (non-fatal)"
