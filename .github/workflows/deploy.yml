name: deploy

# Build deploy zip and push to Azure App Service app-aigovern-dev.
# Triggered on push to main. The build-zip step bakes GITHUB_SHA into a
# BUILD_SHA file inside the zip; the post-deploy smoke test reads
# /api/health and confirms the live sha matches the commit we deployed.
#
# Session 19: closes the "is it actually deployed?" gap. Previously every
# session's merge required `python deploy/build-zip.py` + manual zip push
# (deploy/deploy-and-poll.ps1) — easy to forget, no audit trail.

on:
  push:
    branches: [main]
    paths-ignore:
      # Session 22: skip deploy for changes that can't affect the running app.
      # Path filters are evaluated per-commit across the diff — a mixed
      # code+doc commit still triggers deploy. workflow_dispatch below
      # always allows manual re-trigger if a skip turns out to be wrong.
      - 'docs/**/*'
      - '**/*.md'
      - '.github/workflows/contract-tests*.yml'
      # Session 41 (compound 28a decision-gate action — tally hit 4/8):
      # V2 split shipped two Vite SPAs (team-portal, ciso-console) that are
      # NOT baked into the engine zip — verified against deploy/build-zip.py
      # INCLUDE allowlist (S19c). Their source-only commits cannot affect
      # the running engine; skip deploy. Reverse if SPA artifacts ever ship
      # in the engine zip (e.g. server-side rendering).
      - 'team-portal/**'
      - 'ciso-console/**'
  workflow_dispatch:

concurrency:
  group: deploy-app-aigovern-dev
  cancel-in-progress: false  # never cancel a deploy mid-flight

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write  # required for OIDC federated credential
    env:
      # Opt into Node 24 ahead of the 2026-06-02 forced flip so we validate
      # the JS-action runtime change on our schedule, not GitHub's. Cheaper
      # and more reversible than bumping every action version individually.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1  # GITHUB_SHA env is enough; no git history needed

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build deploy zip
        run: python deploy/build-zip.py
        # build-zip.py reads GITHUB_SHA (always set by Actions) and writes it
        # into the zip as a BUILD_SHA file. dashboard.py reads BUILD_SHA at
        # startup and returns it from /api/health.

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # S46 / A15 — Slot-based zero-downtime deploy:
      #   1. Deploy zip to `staging` slot (does not touch live traffic)
      #   2. Poll staging-slot /api/health until live sha == GITHUB_SHA
      #   3. `az webapp deployment slot swap` to promote staging → production
      #   4. Verify production /api/health now reports the new sha
      # Rollback: re-run `az webapp deployment slot swap` to swap back; the
      # old code is preserved in the *staging* slot post-swap.

      - name: Deploy to Azure App Service (staging slot)
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-aigovern-dev
          slot-name: staging
          package: deploy/app.zip
          # No publish-profile — webapps-deploy@v3 reuses the OIDC session
          # from azure/login. SCM Basic Auth stays disabled (secure default).

      - name: Wait for staging-slot SHA to match commit
        # Poll the staging-slot /api/health until the live sha equals
        # GITHUB_SHA. A 200 alone is insufficient — during the App Service
        # zip-swap window the previous container keeps serving 200 with
        # the prior sha (S20b: extends S19d "200 != fresh" to readiness).
        # P2v3 warm-restart is typically 30-60s; we allow up to 5 min.
        run: |
          deployed=""
          for i in $(seq 1 30); do
            sleep 10
            body=$(curl -fsS https://app-aigovern-dev-staging.azurewebsites.net/api/health 2>/dev/null || echo "")
            deployed=$(echo "$body" | python -c "import json,sys; print(json.loads(sys.stdin.read() or '{}').get('sha',''))" 2>/dev/null || echo "")
            echo "[$i] staging sha: ${deployed:-<no response>}  expected: $GITHUB_SHA"
            if [ "$deployed" = "$GITHUB_SHA" ]; then
              echo "OK: staging sha matches commit after ${i}0s"
              exit 0
            fi
          done
          echo "::error::Staging SHA never matched commit within 5 min. Last sha: '$deployed'. Deploy likely failed silently or staging slot is unreachable. NO SWAP PERFORMED — production untouched."
          exit 1

      - name: Swap staging → production
        # Atomic slot swap promotes staging code to production. Old code
        # moves to the staging slot, giving instant rollback via re-swap.
        run: |
          az webapp deployment slot swap \
            --name app-aigovern-dev \
            --resource-group rg-aigovern-dev \
            --slot staging \
            --target-slot production
          echo "OK: swap complete — production now serves $GITHUB_SHA"

      - name: Verify production SHA after swap
        # Belt-and-braces: confirm production /api/health reports the new
        # sha. Swap is atomic but DNS/edge caches can briefly serve the
        # prior container; we allow up to 2 min for the swap to fully
        # propagate. If this fails, manual swap-back required.
        run: |
          deployed=""
          for i in $(seq 1 12); do
            sleep 10
            body=$(curl -fsS https://app-aigovern-dev.azurewebsites.net/api/health 2>/dev/null || echo "")
            deployed=$(echo "$body" | python -c "import json,sys; print(json.loads(sys.stdin.read() or '{}').get('sha',''))" 2>/dev/null || echo "")
            echo "[$i] production sha: ${deployed:-<no response>}  expected: $GITHUB_SHA"
            if [ "$deployed" = "$GITHUB_SHA" ]; then
              echo "OK: production sha matches commit after swap"
              exit 0
            fi
          done
          echo "::error::Production SHA did not match commit within 2 min post-swap. Swap may have stalled. Manual investigation required (consider: az webapp deployment slot swap --slot production --target-slot staging to revert)."
          exit 1
