schema_version: "1.0"
framework: "eu-ai-act"
display_name: "EU AI Act"
recommended_owner: "AI Governance"
items:
  - id: "eu-art-09-risk-mgmt"
    display_name: "Art.9 — Risk Management System"
    description: "Establish, implement, document and maintain a risk management system throughout the entire lifecycle of a high-risk AI system."
    exact_clauses: ["Art.9", "Art.9.1", "Art.9.2", "Art.9.3", "Art.9.4"]
    prefix_clauses: []
    recommended_owner: "Model Risk"

  - id: "eu-art-10-data-governance"
    display_name: "Art.10 — Data and Data Governance"
    description: "Training, validation and testing data sets must be subject to data governance practices covering data collection, processing, formulation of relevant assumptions, examination of availability and suitability, examination of possible biases, and identification of data gaps."
    exact_clauses: ["Art.10", "Art.10.1", "Art.10.2", "Art.10.3"]
    prefix_clauses: []
    recommended_owner: "Model Risk"

  - id: "eu-art-11-technical-documentation"
    display_name: "Art.11 — Technical Documentation"
    description: "Technical documentation must be drawn up before a high-risk AI system is placed on the market and kept up to date, enabling authorities to assess conformity with the requirements of this Regulation."
    exact_clauses: ["Art.11", "Art.11.1"]
    prefix_clauses: []
    recommended_owner: "AI Governance"

  - id: "eu-art-12-record-keeping"
    display_name: "Art.12 — Record-Keeping"
    description: "High-risk AI systems must be designed and developed with capabilities enabling the automatic recording of events (logs) throughout the system's lifetime."
    exact_clauses: ["Art.12", "Art.12.1", "Art.12.2"]
    prefix_clauses: []
    recommended_owner: "Internal Audit"

  - id: "eu-art-13-transparency"
    display_name: "Art.13 — Transparency and Provision of Information to Users"
    description: "High-risk AI systems must be designed and developed in such a way as to ensure that their operation is sufficiently transparent to enable users to interpret the system's output and use it appropriately."
    exact_clauses: ["Art.13", "Art.13.1", "Art.13.2", "Art.13.3"]
    prefix_clauses: []
    recommended_owner: "AI Governance"

  - id: "eu-art-14-human-oversight"
    display_name: "Art.14 — Human Oversight"
    description: "High-risk AI systems must be designed and developed in such a way, including with appropriate human-machine interface tools, that they can be effectively overseen by natural persons during the period in which the AI system is in use."
    exact_clauses: ["Art.14", "Art.14.1", "Art.14.2", "Art.14.3", "Art.14.4"]
    prefix_clauses: []
    recommended_owner: "CRO"

  - id: "eu-art-15-accuracy-robustness"
    display_name: "Art.15 — Accuracy, Robustness and Cybersecurity"
    description: "High-risk AI systems must be designed and developed in such a way that they achieve, in light of their intended purpose, an appropriate level of accuracy, robustness and cybersecurity, and perform consistently in those respects throughout their lifecycle."
    exact_clauses: ["Art.15", "Art.15.1", "Art.15.2", "Art.15.3", "Art.15.4"]
    prefix_clauses: []
    recommended_owner: "AppSec / Model Risk"
