<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Demo Control · AI Assurance</title>
  <style>
    :root {
      --bg: #0b0f17;
      --bg-card: #131a26;
      --bg-elev: #1a2333;
      --fg: #e4e8ef;
      --fg-muted: #97a3b6;
      --accent: #60a5fa;
      --ok: #34d399;
      --warn: #fbbf24;
      --err: #f87171;
      --border: #2a3447;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    header { padding: 22px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; margin: 0; letter-spacing: 0.3px; }
    header .meta { font-size: 12px; color: var(--fg-muted); font-family: var(--mono); }
    main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
    .intro { color: var(--fg-muted); font-size: 14px; margin-bottom: 24px; max-width: 760px; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; }
    .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--fg); }
    .card-brief { color: var(--fg-muted); font-size: 13px; line-height: 1.55; }
    .card-meta { display: flex; gap: 14px; font-size: 11px; color: var(--fg-muted); font-family: var(--mono); }
    .narration { background: var(--bg-elev); border-radius: 6px; padding: 10px 12px; font-size: 12px; line-height: 1.5; color: var(--fg-muted); border-left: 2px solid var(--accent); max-height: 140px; overflow-y: auto; white-space: pre-wrap; }
    .narration.empty { color: #4a566b; font-style: italic; }
    .actions { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
    button { background: var(--accent); color: #0b1320; border: 0; border-radius: 6px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
    button:disabled { background: var(--bg-elev); color: var(--fg-muted); cursor: not-allowed; }
    .status { font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 4px; background: var(--bg-elev); color: var(--fg-muted); }
    .status.running { color: var(--warn); }
    .status.completed { color: var(--ok); }
    .status.failed { color: var(--err); }
    .result { background: #06090f; border-radius: 6px; padding: 10px 12px; font-family: var(--mono); font-size: 11px; line-height: 1.5; color: #b8c4d6; max-height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .result.hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>AI Assurance · Demo Control</h1>
    <div class="meta" id="meta">role: <span id="role">demo-operator</span></div>
  </header>
  <main>
    <p class="intro">
      One-click triggers for the six demo scenarios. Each scenario invokes the real backend &mdash; PII pipeline, gate engine,
      agent library, right-to-forget cascade, eval trend, and framework export &mdash; no mocks. Talk tracks below each card.
    </p>
    <div class="grid" id="grid"></div>
  </main>

  <script>
    const ROLE_HEADER = { "X-Role": "demo-operator" };
    const grid = document.getElementById("grid");

    async function fetchJson(url, opts = {}) {
      const res = await fetch(url, { ...opts, headers: { ...ROLE_HEADER, ...(opts.headers || {}) } });
      const ct = res.headers.get("content-type") || "";
      const body = ct.includes("json") ? await res.json().catch(() => null) : await res.text();
      return { ok: res.ok, status: res.status, body };
    }

    async function loadScenarios() {
      const { ok, body } = await fetchJson("/api/demo-control/scenarios");
      if (!ok) {
        grid.innerHTML = `<div class="card">Failed to load scenarios. Check role + auth.</div>`;
        return;
      }
      for (const s of body.scenarios) renderCard(s);
    }

    function renderCard(s) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="card-title">${escapeHtml(s.title)}</div>
            <div class="card-meta">id: ${escapeHtml(s.id)} · ~${s.expected_duration_sec}s</div>
          </div>
          <span class="status" data-status>idle</span>
        </div>
        <div class="card-brief">${escapeHtml(s.brief)}</div>
        <div class="narration empty" data-narration>Loading narration…</div>
        <div class="actions">
          <button data-run>Run scenario</button>
          <span class="card-meta" data-runid></span>
        </div>
        <div class="result hidden" data-result></div>
      `;
      grid.appendChild(card);

      const narrationEl = card.querySelector("[data-narration]");
      const statusEl = card.querySelector("[data-status]");
      const resultEl = card.querySelector("[data-result]");
      const runIdEl = card.querySelector("[data-runid]");
      const btn = card.querySelector("[data-run]");

      loadNarration(narrationEl, s.narration_url);

      btn.addEventListener("click", () => runScenario(s.id, btn, statusEl, resultEl, runIdEl));
    }

    async function loadNarration(el, url) {
      try {
        const res = await fetch(url, { headers: ROLE_HEADER });
        if (!res.ok) throw new Error("not available");
        const text = await res.text();
        el.textContent = text.slice(0, 800);
        el.classList.remove("empty");
      } catch {
        el.textContent = "Narration not yet available (docs/demo-scripts/).";
      }
    }

    async function runScenario(id, btn, statusEl, resultEl, runIdEl) {
      btn.disabled = true;
      statusEl.className = "status running";
      statusEl.textContent = "running";
      resultEl.classList.add("hidden");

      const { ok, body, status } = await fetchJson(`/api/demo-control/run/${id}`, { method: "POST" });
      if (!ok) {
        statusEl.className = "status failed";
        statusEl.textContent = `error ${status}`;
        btn.disabled = false;
        return;
      }
      const runId = body.run_id;
      runIdEl.textContent = `run: ${runId.slice(0, 8)}`;

      // Synchronous execution — final state is in this response.
      statusEl.className = `status ${body.status}`;
      statusEl.textContent = body.status;

      const final = await fetchJson(`/api/demo-control/run/${runId}/status`);
      const payload = final.ok ? final.body : body;
      resultEl.textContent = JSON.stringify(payload, null, 2);
      resultEl.classList.remove("hidden");
      btn.disabled = false;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    loadScenarios();
  </script>
</body>
</html>
