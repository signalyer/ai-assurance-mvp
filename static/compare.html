<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model Comparison — AI Assurance</title>
    <link rel="stylesheet" href="/static/shared.css">
    <style>
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .model-column {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 0.5rem;
            padding: 1.5rem;
        }

        .model-column h3 {
            margin: 0 0 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .winner-badge {
            background: linear-gradient(45deg, #f59e0b, #fbbf24);
            color: #000;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem;
            border-bottom: 1px solid #21262d;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-name {
            color: #8b949e;
            font-size: 0.875rem;
        }

        .metric-value {
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .response-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 0.375rem;
            padding: 0.75rem;
            max-height: 250px;
            overflow-y: auto;
            font-size: 0.85rem;
            white-space: pre-wrap;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <h1>AI Assurance</h1>
            <span class="subtitle">Model Comparison</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/analytics" class="nav-link">Analytics</a>
            <a href="/security" class="nav-link">Security</a>
            <a href="/domains" class="nav-link">Domains</a>
            <a href="/compare" class="nav-link active">Compare</a>
        </div>
        <div class="nav-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Loading...</span>
        </div>
    </nav>

    <div class="page">
        <div class="page-header">
            <h2>Model Comparison</h2>
            <div class="desc">Run the same prompt through Claude and GPT-4o side-by-side</div>
        </div>

        <div class="card">
            <div class="form-group">
                <label class="form-label">Domain</label>
                <select class="form-select" id="domainSelect">
                    <option value="">Default (Finance)</option>
                </select>
            </div>
            <button class="btn" id="compareBtn">
                <span id="compareBtnText">Run Comparison</span>
                <span class="spinner" id="compareSpinner" style="display: none;"></span>
            </button>
            <span id="compareStatus" style="margin-left: 1rem; color: #8b949e;"></span>
        </div>

        <div id="results" style="display: none;">
            <div class="card">
                <h3>Prompt</h3>
                <div class="response-box" id="promptDisplay"></div>
            </div>

            <div class="compare-grid" id="compareGrid"></div>
        </div>
    </div>

    <script>
        async function loadDomains() {
            try {
                const r = await fetch('/api/domains');
                const d = await r.json();
                const sel = document.getElementById('domainSelect');
                sel.innerHTML = '<option value="">Default (Finance)</option>';
                d.domains.forEach(dom => {
                    const opt = document.createElement('option');
                    opt.value = dom.id;
                    opt.textContent = dom.name;
                    sel.appendChild(opt);
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function checkHealth() {
            try {
                const r = await fetch('/api/health');
                const d = await r.json();
                document.getElementById('statusDot').classList.toggle('ready', d.status === 'ready');
                document.getElementById('statusText').textContent = d.status === 'ready' ? 'Ready' : 'Setup needed';
            } catch (e) {
                document.getElementById('statusText').textContent = 'Error';
            }
        }

        async function runComparison() {
            const btn = document.getElementById('compareBtn');
            const btnText = document.getElementById('compareBtnText');
            const spinner = document.getElementById('compareSpinner');
            const status = document.getElementById('compareStatus');

            const domain = document.getElementById('domainSelect').value;

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';
            status.style.color = '#8b949e';
            status.textContent = 'Running both models...';

            try {
                const url = domain ? `/api/demo/run?domain=${encodeURIComponent(domain)}` : '/api/demo/run';
                const r = await fetch(url, { method: 'POST' });
                const data = await r.json();

                if (data.error) {
                    status.textContent = 'Error: ' + data.error;
                    status.style.color = '#ef4444';
                } else if (data.runs && data.runs.length >= 2) {
                    renderComparison(data.runs);
                    status.textContent = 'Comparison complete';
                    status.style.color = '#22c55e';
                } else {
                    status.textContent = 'Need at least 2 model runs to compare';
                    status.style.color = '#f59e0b';
                }
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
                status.style.color = '#ef4444';
            } finally {
                btn.disabled = false;
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
            }
        }

        function calculateScore(evalScores) {
            if (!evalScores) return 0;
            const values = Object.values(evalScores);
            const passes = values.filter(v => v.passed === true).length;
            return passes / values.length;
        }

        function renderComparison(runs) {
            document.getElementById('results').style.display = 'block';
            document.getElementById('promptDisplay').textContent = runs[0].prompt;

            const scores = runs.map(r => calculateScore(r.eval_scores));
            const winner = scores.indexOf(Math.max(...scores));

            const grid = document.getElementById('compareGrid');
            grid.innerHTML = runs.map((run, i) => {
                const score = scores[i];
                const isWinner = i === winner && scores.filter(s => s === scores[winner]).length === 1;
                const failCount = Object.values(run.eval_scores || {}).filter(m => m.passed === false).length;
                const risk = failCount === 0 ? 'LOW' : failCount <= 2 ? 'MEDIUM' : 'HIGH';
                const riskCls = failCount === 0 ? 'badge-low' : failCount <= 2 ? 'badge-medium' : 'badge-high';

                return `
                <div class="model-column">
                    <h3>
                        <span>${run.model}</span>
                        ${isWinner ? '<span class="winner-badge">🏆 WINNER</span>' : ''}
                    </h3>

                    <div class="stat-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 1rem;">
                        <div class="stat-card">
                            <div class="stat-label">Score</div>
                            <div class="stat-value">${(score * 100).toFixed(0)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Risk</div>
                            <div class="stat-value"><span class="badge ${riskCls}">${risk}</span></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Latency</div>
                            <div class="stat-value">${run.latency_ms}ms</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Tokens</div>
                            <div class="stat-value">${run.tokens_used}</div>
                        </div>
                    </div>

                    <h4 style="margin: 1rem 0 0.5rem 0; font-size: 0.875rem; color: #8b949e;">Metrics</h4>
                    ${Object.entries(run.eval_scores || {}).map(([name, m]) => `
                        <div class="metric-row">
                            <span class="metric-name">${name.replace(/_/g, ' ')}</span>
                            <span class="metric-value">
                                ${m.skipped ? '—' : (m.score !== null && m.score !== undefined ? m.score.toFixed(2) : 'N/A')}
                                <span class="badge ${m.passed === true ? 'badge-pass' : m.passed === false ? 'badge-fail' : 'badge-medium'}" style="margin-left: 0.5rem;">
                                    ${m.skipped ? 'SKIP' : m.passed === true ? 'PASS' : 'FAIL'}
                                </span>
                            </span>
                        </div>
                    `).join('')}

                    <h4 style="margin: 1rem 0 0.5rem 0; font-size: 0.875rem; color: #8b949e;">Response</h4>
                    <div class="response-box">${run.response || 'No response'}</div>
                </div>`;
            }).join('');
        }

        document.getElementById('compareBtn').addEventListener('click', runComparison);

        checkHealth();
        loadDomains();
    </script>
</body>
</html>
