  <rect x="56" y="1216" width="20" height="14" rx="2" fill="#131a26" stroke="#60a5fa"/>
  <text x="84" y="1228" fill="#97a3b6" font-size="11">Built (Sessions 01-11)</text>
  <rect x="234" y="1216" width="20" height="14" rx="2" fill="url(#hatch)" stroke="#97a3b6" stroke-dasharray="4 3"/>
