  <text x="40" y="1100" fill="#60a5fa" font-size="13" font-weight="600" letter-spacing="2">D · CLIENT EDGES</text>

  <rect x="40" y="1115" width="200" height="58" rx="8" fill="#131a26" stroke="#2a3447"/>
  <text x="140" y="1138" fill="#e4e8ef" font-size="12" font-weight="600" text-anchor="middle">Python SDK</text>
  <text x="140" y="1156" fill="#97a3b6" font-size="10" text-anchor="middle">signallayer · HMAC-signed</text>

  <rect x="260" y="1115" width="200" height="58" rx="8" fill="#131a26" stroke="#2a3447"/>
  <text x="360" y="1138" fill="#e4e8ef" font-size="12" font-weight="600" text-anchor="middle">CLI</text>
  <text x="360" y="1156" fill="#97a3b6" font-size="10" text-anchor="middle">sl login/onboard/gate/eval</text>

  <rect x="480" y="1115" width="200" height="58" rx="8" fill="#131a26" stroke="#2a3447"/>
  <text x="580" y="1138" fill="#e4e8ef" font-size="12" font-weight="600" text-anchor="middle">Dashboard (HTML)</text>
  <text x="580" y="1156" fill="#97a3b6" font-size="10" text-anchor="middle">static/*.html · role-based</text>

  <rect x="700" y="1115" width="220" height="58" rx="8" fill="#131a26" stroke="#fbbf24"/>
  <text x="810" y="1138" fill="#fbbf24" font-size="12" font-weight="600" text-anchor="middle">Demo Control (Session 11)</text>
  <text x="810" y="1156" fill="#97a3b6" font-size="10" text-anchor="middle">/demo-control · 6 scenarios</text>

  <!-- Phase-2 clients with hatch fill -->
  <rect x="940" y="1115" width="200" height="58" rx="8" fill="url(#hatch)" stroke="#97a3b6" stroke-dasharray="6 4"/>
  <text x="1040" y="1138" fill="#e4e8ef" font-size="12" font-weight="600" text-anchor="middle">Team Portal split</text>
  <text x="1040" y="1156" fill="#97a3b6" font-size="10" text-anchor="middle">Phase-2 stub</text>

  <rect x="1160" y="1115" width="200" height="58" rx="8" fill="url(#hatch)" stroke="#97a3b6" stroke-dasharray="6 4"/>
  <text x="1260" y="1138" fill="#e4e8ef" font-size="12" font-weight="600" text-anchor="middle">Real-time webhooks</text>
  <text x="1260" y="1156" fill="#97a3b6" font-size="10" text-anchor="middle">Phase-2 stub (polling v1)</text>

  <!-- ====================================================================== -->
